<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; padding: 20px; }
  .container { width: 400px; border: 2px solid red; }
  .grid { display: grid; grid-template-columns: minmax(max-content, 1fr) 100px minmax(max-content, 1fr); gap: 10px; overflow-x: auto; }
  .item { border: 1px solid blue; padding: 10px; }
</style>
</head>
<body>
  <div class="container">
    <div class="grid">
      <div class="item">Long content that forces max-content to be very wide</div>
      <div class="item">Mid</div>
      <div class="item">Another long content that forces max-content</div>
    </div>
  </div>
</body>
</html>
