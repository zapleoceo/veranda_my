name: Deploy to veranda.my

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-veranda-my
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Ensure rsync
        shell: bash
        run: |
          if ! command -v rsync >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y rsync
          fi

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if [ -n "${{ secrets.SSH_KNOWN_HOSTS }}" ]; then
            echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          fi

      - name: Check SSH connectivity
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking TCP connectivity to ${{ secrets.SSH_HOST }}:${{ secrets.SSH_PORT }} ..."
          timeout 5 bash -lc "cat < /dev/null > /dev/tcp/${{ secrets.SSH_HOST }}/${{ secrets.SSH_PORT }}"
          echo "TCP OK"

      - name: Deploy files
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-p ${{ secrets.SSH_PORT }} -i ~/.ssh/id_ed25519 -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=10 -o ConnectionAttempts=3 -o ServerAliveInterval=15 -o ServerAliveCountMax=3"

          for i in 1 2 3; do
            echo "rsync attempt ${i}/3"
            rsync -az \
              --delete \
              --delete-after \
              --exclude ".env" \
              --exclude ".env.*" \
              --exclude "*.log" \
              --exclude "telegram.log" \
              --exclude "prob_close_backfill.log" \
              --exclude "tmp/" \
              --exclude "cache/" \
              --exclude ".cache/" \
              --exclude "payday2/local_config.json" \
              --exclude "wa_listener/auth/" \
              --exclude "wa_listener/qr_state.json" \
              --exclude "wa_listener/node_modules/" \
              --exclude "wa_listener/package-lock.json" \
              --exclude ".git/" \
              --exclude ".github/" \
              -e "ssh ${SSH_OPTS}" \
              ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/ && break
            sleep $((i * 3))
          done

      - name: Remove debug files (server)
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-p ${{ secrets.SSH_PORT }} -i ~/.ssh/id_ed25519 -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=10 -o ConnectionAttempts=3 -o ServerAliveInterval=15 -o ServerAliveCountMax=3"
          for i in 1 2 3; do
            echo "ssh attempt ${i}/3"
            ssh ${SSH_OPTS} "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
              "rm -f '${{ secrets.DEPLOY_PATH }}/mail.php' '${{ secrets.DEPLOY_PATH }}/access.php'" && break
            sleep $((i * 3))
          done

      - name: Verify PHP syntax (server)
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-p ${{ secrets.SSH_PORT }} -i ~/.ssh/id_ed25519 -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=10 -o ConnectionAttempts=3 -o ServerAliveInterval=15 -o ServerAliveCountMax=3"
          for i in 1 2 3; do
            echo "ssh attempt ${i}/3"
            ssh ${SSH_OPTS} "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
              "cd '${{ secrets.DEPLOY_PATH }}' && PHP=/opt/php74/bin/php && \$PHP -l index.php && \$PHP -l login.php && \$PHP -l logout.php && \$PHP -l auth_callback.php && \$PHP -l dashboard.php && \$PHP -l rawdata.php && \$PHP -l rawdata_receipts_chunk.php && \$PHP -l kitchen_online.php && \$PHP -l admin/index.php && \$PHP -l cron.php && \$PHP -l telegram_alerts.php && \$PHP -l roma/index.php && \$PHP -l banya/index.php && \$PHP -l employees/index.php && \$PHP -l reservations/index.php" && break
            sleep $((i * 3))
          done
